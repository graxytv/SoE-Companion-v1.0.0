[AutoGrail]
; Controls whether SoE Companion treats the shared hook as the required Drops Tracker Hook.
; The shared ijl11.dll can also be used for Identified Drops.
Enabled=0
HookVersion=drop-events-v2

[DropIdentified]
; Set each rarity to 1 (identified) or 0 (unidentified)
; Charm options only affect magic charms and work even when Magic=0.
; Changes take effect on next game launch
Magic=0
Rare=0
Set=0
Unique=0
SmallCharm=0
LargeCharm=0
GrandCharm=0

[SaveExitAutomation]
; F12 experimental reset automation:
; ESC, UP, ENTER leaves the current game. WAIT_MAIN_MENU waits until the
; D2Client player pointer is gone and stable before the click is allowed.
; CLICK selects Single Player without moving the mouse cursor, ENTER confirms
; the character, and DIFFICULTY presses R/N/H based on Difficulty.
DelayMs=300
MainMenuWaitMs=10000
MainMenuStableMs=800
CoordinateModePercent=0
ClickX=400
ClickY=340
Difficulty=Normal
HotkeyVk=123
HotkeyModifiers=0
Step1=ESC
Step2=UP
Step3=ENTER
Step4=WAIT_MAIN_MENU
Step5=CLICK
Step6=ENTER
Step7=DIFFICULTY
